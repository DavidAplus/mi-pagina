<!DOCTYPE html>
<html>
<head>

 <title>OFICINA VIRTUAL - A PLUS CONSULTING GROUP</title>
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>
    
   body{
    margin: 0;
}

/* ENCABEZADO */
.arriba{
    background-color: rgb(98, 98, 212);
    display: flex;
    align-items: center;
    padding: 10px;
    gap: 15px;
}

#Logo{
    width: 160px;
    height: auto;
}

h1{
    color: white;
    font-family: Arial, sans-serif;
    font-size: 50px;
    margin: 0;
    text-shadow: 1px 5px 10px black;
    text-align: center;
}

/* CONTENEDOR PRINCIPAL */
.forms{
    margin: 15px auto;
    display: flex;
    flex-direction: column;
    align-items: center;

    width: min(650px, 95%);
    min-height: 300px;
    float: right;

    background-color: rgb(179, 196, 196);
    box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
}

/* TITULO DEL FORMULARIO */
h4{
    color: white;
    font-family: Arial, sans-serif;
    background-color: rgb(0, 58, 248);

    width: 100%;
    height: 50px;
    margin: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    text-shadow: 1px 5px 10px black;
    box-sizing: border-box;
}

/* LISTADO */
.listado{
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.listado input{
    width: 95%;
    max-width: 600px;
    height: 35px;
    margin-top: 5px;
    background-color: rgb(230, 230, 230);
    box-sizing: border-box;
}

.listado input:hover{
    background-color: rgb(98, 98, 212);
    color: white;
    cursor: pointer;
}

/* MOVILES */
@media screen and (max-width: 768px){

    .arriba{
        flex-direction: row;
        text-align: center;
    }

    h1{
        font-size: 28px;
    }

    h4{
        font-size: 16px;
        padding: 0 10px;
        text-align: center;
    }

    #Logo{
        width: 100px;
    }

    .forms{
        width: auto;
        margin: auto;
    }

    .listado input{
        width: auto;
        font-size: 14px;
    }
}
   </style>

</head>

<body>
    <div class="arriba">
 <img id="Logo" src="/IMAGENES.png/OIP (1).png">
 <h1>A PLUS CONSULTING GROUP</h1>
 </div> 
<div class="forms">
 <h4>SECCION DE FORMULARIOS</h4>
 <div class="listado">
    <input type="button" value="FORMULARIO DE REEMBOLSOS Y AUTORIZACIONES DE SALUD" onclick="location.href='/FORMULARIOS/FORMULARIO%20REEMBOLSOS.html'">
    <br>
    <input type="button" style="margin-top: 15px;" value="FORMULARIO DE RECLAMACIONES GENERALES">
 </div>
</div>
</body>
</html>
