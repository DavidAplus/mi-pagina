        <script>
            
            const solicitudradio = document.getElementsByName('tiposolicitud');
            const procedimiento = document.getElementById('procedimiento');
            let seleccionform = '/FORMULARIOS/REEMBOLSOS2.html';

            //esto para que se mantenga mostrado el campo procedimiento si el user vuelve patras

            window.addEventListener('pageshow', function() {
                const selecsol = document.querySelector('input[name="tiposolicitud"]:checked');
            if(selecsol && selecsol.value === 'RECLAMO'){
                procedimiento.style.display = 'block'
            } else {procedimiento.style.display = 'none'}
        });
                  // este para que se muestre o no el campo de procedimiento si se cambia el tipo de solicitud

            solicitudradio.forEach(
                function(radi) {
                    radi.addEventListener('change', function() {
                        if(radi.value === 'RECLAMO') {procedimiento.style.display = 'block';
                            seleccionform = '/FORMULARIOS/REEMBOLSOS2.html';
                            } else if(radi.value === 'AUTORIZACION') {procedimiento.style.display = 'none';
                            seleccionform = '/FORMULARIOS/AUTORIZACION.html';
                        } else {procedimiento.style.display = 'none';}
                    })
                }
            )
            // formato de campo cedula
             
            const nocedula   = document.getElementById('CEDULATITULAR');

            nocedula.addEventListener('input', function(){
            let valor = this.value;
            valor = valor.replace(/\D/g, '');
            this.value = valor;

            if(valor.length > 3){
                valor = valor.slice(0, 3) + '-' + valor.slice(3);
            }
            this.value = valor;
            if(valor.length> 11){
                valor= valor.slice(0, 11) + '-' + valor.slice(11)
            }
            this.value = valor;

            console.log(valor);
        });

        nocedula.addEventListener('input', async function(){
            let valor = this.value;
           if(valor.length === 13) {
                const respuesta = await fetch("serverbasedatos-gnefccfqbaa7gwaa.canadacentral-01.azurewebsites.net/cedula/" + valor);
                const dato = await respuesta.json();
                console.log(dato);
                document.getElementById('CORREO').value = dato[0].CORREO;
                document.getElementById('NOMBREASEGURADO').value = dato[0].NOMBRE_APELLIDO;
                document.getElementById('NUMERO').value = dato[0].NUMERO;
            }
        });
        // para guardar la informacion del formulario pag 1
        const boton = document.getElementById('boton');
        const carga = document.getElementById('load');

        boton.addEventListener('click', async function() {

        //GUARDAR EL CARNET DE SEGUROS

         const carnetfile = document.getElementById('carnet').files;

         //PARA CONVERTIR NUESTROS FILES EN BASE 64

         const convertbase64 = function(file){
            return new Promise(function(resolve, reject){
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(){
                    resolve(reader.result.split(',')[1])
                };
                reader.onerror = function(error){
                    reject.error
                };
            })
         }
         
         const carnetdocumentos = [];

         for(const file of carnetfile){
            carnetdocumentos.push({
                filename:file.name,
                filecontent:await convertbase64(file)
            })
         }


         // guardar la vaina del documento
         localStorage.setItem('filespagina', JSON.stringify(carnetdocumentos));

         
          //local save de textos
          const formulario1 = document.getElementById('reclamosS');
          const Datosg = new FormData(formulario1);
          const objeto = Object.fromEntries(Datosg.entries());
          localStorage.setItem('formulario1', JSON.stringify(objeto));

          location.href = seleccionform
        }
    )
        </script>
