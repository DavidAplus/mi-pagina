        <form id="AUTORIZACION">
            <labeL>TIPO DE PLAN</labeL>
            <br>
            <br>
            <input class = "inputselect" type="radio" name="plan" value="PLAN BASICO"> <label class="option">PLAN BASICO</label>

              <label>INDICACION</label>
              <br>
              <br>
              <input type="file" name="INDICACIONFILE" id="respaldo" accept=".pdf, .jpg, .jpeg, .png" multiple>
              <br>
              <br>
              <br>
            <input class="next" id="boton" type="submit" value="ENVIAR">
            <input id="atras" type="button" value="ATRAS" onclick="history.back()">
        </form>
        <script>

            const boton = document.getElementById('boton');
            const cargasion = document.getElementById('load');
            boton.addEventListener('click', async function(X){
                X.preventDefault();
                cargasion.style.display = 'flex';

                //guardar pagina actual
             const autorizacion = document.getElementById('AUTORIZACION');
             const data = new FormData(autorizacion);
             const objeto = Object.fromEntries(data.entries());
             localStorage.setItem('autorizacion', JSON.stringify(objeto));

             // obtener file
    
                const archivosdeindicacion = document.getElementById('respaldo').files;

             // para convertir el file en base 64 y pasarlo pa cherpoin
                const convertbase64 = function(file) {
                    return new Promise(function(resolve, reject){
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = function(){
                        resolve(reader.result.split(',')[1]);
                    };
                    reader.onerror = function(error){
                        reject(error);
                    }
                    })
                }
                
                const filespagina = JSON.parse(localStorage.getItem('filespagina')) || [];

                for(const file of archivosdeindicacion){
                    const contenido = await convertbase64(file);

                    filespagina.push({
                        filename: file.name,
                        filecontent: contenido
                    });
                }

                localStorage.setItem('filespagina', JSON.stringify(filespagina));
              // INTEGRACION CON SHAREPOINT POWER AUTOMATE  TEST
               // DATOS FINALES 
              const datosfinales = {
              pagina1: JSON.parse(localStorage.getItem('formulario1')) || [],
              pagina2: JSON.parse(localStorage.getItem('reclamosS2')) || [],
              autorizacion: JSON.parse(localStorage.getItem('autorizacion')) || [],
              pagina3: JSON.parse(localStorage.getItem('transferencias')) || [],
              filespagina: JSON.parse(localStorage.getItem('filespagina')) || []
             };

              await fetch('https://defaultc78fcef3592941de8ed54896f11961.32.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/30f8a0dd1c71421ebcfea439eb3cdead/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=taaZJr7pjfMy8OswRXhkQLJx9a7RGRtYBsxI_9d_Bu0',
                {
                    method: 'POST',
                    headers: {'content-type': 'application/json'},
                    body: JSON.stringify(datosfinales)
                }
              );
              cargasion.style.display = 'none';
              location.href = '/GRACIAS.html';
            })
        </script>
