            form{

           h4{
               top: 500px;

             }
            h6{

            h5{

    <body>
        <img src="/IMAGENES.png/OIP (1).png" alt="Logo">
        <div id="carga"> 
            <img src="/IMAGENES.png/cargando.gif">
        </div>
        <h1 class="TituloCentrado">
            <span class="title">
          TRANSFERENCIA</span>
        </h1>
        <h5>PARA ASISTENCIA PONERSE EN CONTACTO CON <a href="https://wa.me/18297484467">+1 (829) 748-4467</a></h5>
        <h4>(FO-OPE-RS-01)</h4>
        <h6>(código del formulario)</h6>
        <form id="transferencias">
            <label>MONTO</label>
            <br>
            <br>
            <input type="text" id="monto" name="monto" required>
             <br>
             <br>
           <label>ENTIDAD BANCARIA</label>
           <br>
           <br>
           <input type="text" id="entidad" name="entidad" required>
           <br>
           <br>
           <label>NOMBRE DE CUENTA</label>
           <br>
           <br>
           <input type="text" id="nombreCuenta" name="nombreCuenta" required>
           <br>
           <br>
            <label>NUMERO DE CUENTA</label>
            <br>
            <br>
            <input type="text" id="NOCUENTA" name="numeroCuenta" required>
             <br>
             <br>
             <label>TIPO DE CUENTA</label>
             <br>
             <br>
             <select id="tipoCuenta" name="tipoCuenta" required>
                 <option value="">Seleccione una opción</option>
                 <option value="AHORROS">AHORROS</option>
                 <option value="CORRIENTE">CORRIENTE</option>
             </select>
              <br>
              <br>
              <br>
            <input class="next" type="submit" id="entregar" value="ENTREGAR">
            <input type="button" id="atras" value="ATRAS" onclick="history.back()">
        </form>
        <script>
          //validacion para numero de cuenta
          const numeroCuenta = document.getElementById('NOCUENTA');
          numeroCuenta.addEventListener('input', function() {
              this.value = this.value.replace(/\D/g, '');
          });
          // config del boton pa entregar
          const boton = document.getElementById('entregar');
          const cargando = document.getElementById('carga')
          boton.addEventListener('click', async function(X){
            X.preventDefault();
            cargando.style.display = 'flex'
            boton.disabled = true
            //guardar todito lo dato

            //esta pagina
          const transferencias = document.getElementById('transferencias'); 
          const DatosTransferencias = new FormData(transferencias);
          const objeto = Object.fromEntries(DatosTransferencias.entries());
          localStorage.setItem('transferencias', JSON.stringify(objeto));

          // datos finales 
          const datosfinales = {
              pagina1: JSON.parse(localStorage.getItem('formulario1')),
              pagina2: JSON.parse(localStorage.getItem('reclamosS2')),
              autorizacion: JSON.parse(localStorage.getItem('autorizacion')),
              pagina3: JSON.parse(localStorage.getItem('transferencias')),
              filespagina: JSON.parse(localStorage.getItem('filespagina'))
             };

          //sharepoint
           await fetch('https://defaultc78fcef3592941de8ed54896f11961.32.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/30f8a0dd1c71421ebcfea439eb3cdead/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=taaZJr7pjfMy8OswRXhkQLJx9a7RGRtYBsxI_9d_Bu0',
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json'},
                body: JSON.stringify(datosfinales)
            }
          );
          cargando.style.display = 'none'
          location.href='/GRACIAS.html'
          });
        </script>
    </body>
</html>
